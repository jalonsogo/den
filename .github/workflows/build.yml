name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Pre-create the draft release so electron-builder never has to. Its parallel
  # asset uploads race on get-or-create (two uploads both see "no draft yet"
  # and each create one), splitting assets across duplicate drafts — this
  # happened even within a single job, so max-parallel: 1 didn't prevent it.
  # With the draft already in place, every upload just finds and appends to it.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure single draft release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$TAG" --draft --title "${TAG#v}" --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            builder-args: --mac
          - os: windows-2022
            target: win
            builder-args: --win
          - os: ubuntu-26.04
            target: linux-x64
            builder-args: --linux deb --x64
          - os: ubuntu-26.04-arm
            target: linux-arm64
            builder-args: --linux deb --arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Use project npm version
        run: npm install --global npm@12.0.1

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install setuptools

      - name: Install Linux compiler prerequisites
        if: startsWith(matrix.target, 'linux-')
        run: sudo apt-get update && sudo apt-get install --yes build-essential

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_msvs_version: '2022'

      - name: Import macOS certificate
        if: matrix.os == 'macos-latest'
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build ${{ matrix.target }}
        run: npm run build && npx electron-builder ${{ matrix.builder-args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Validate packaged Linux startup
        if: startsWith(matrix.target, 'linux-')
        shell: bash
        run: |
          deb="$(find dist -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "$deb"
          rm -rf /tmp/den-package
          dpkg-deb --extract "$deb" /tmp/den-package
          node scripts/validate-linux-package.mjs /tmp/den-package
          sudo apt-get update
          sudo apt-get install --yes xvfb xauth libasound2t64 "$PWD/$deb"
          # CI may not preserve setuid ownership for chrome-sandbox. The flag is
          # confined to this isolated runner smoke; installed desktop use keeps
          # Electron's normal sandbox enabled.
          xvfb-run --auto-servernum node scripts/smoke-linux-startup.mjs /opt/den/den --no-sandbox
        env:
          DEN_SMOKE_LIFETIME_MS: '8000'

      - name: Publish ${{ matrix.target }}
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder ${{ matrix.builder-args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}