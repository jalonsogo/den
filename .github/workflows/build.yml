name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          # Pinned to 2022: the node-gyp that compiles node-pty doesn't
          # recognize the newer Visual Studio on the windows-latest (2025) image.
          - os: windows-2022
            target: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # node-pty is compiled from source by electron-builder's install-app-deps.
      # node-gyp needs Python with distutils, which 3.12 dropped — pin 3.11 and
      # install setuptools to provide it.
      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install setuptools

      - name: Install dependencies
        run: npm ci
        env:
          # Help node-gyp locate the runner's Visual Studio C++ toolchain.
          npm_config_msvs_version: '2022'

      - name: Build and publish ${{ matrix.target }}
        run: npm run build && npx electron-builder --${{ matrix.target }} --publish always
        env:
          # Used by electron-builder to create/attach the GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing certs configured yet — skip auto-discovery so the
          # macOS build doesn't fail trying to sign. Harmless on Windows.
          CSC_IDENTITY_AUTO_DISCOVERY: false
